name: smart pipeline
on:
    # push:
      #  branches:
       #     - '*'
  workflow_dispatch:
jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
          - name: linting 
            run: echo "linting is done"

    test:
        runs-on: ubuntu-latest
        steps:
            - name: testing
              run: echo "testing is done "
   
    summary:
        runs-on: ubuntu-latest
        needs: [lint,test]
        steps: 
            - name: print push is done on which branch
              run: |
                if [ "${{github.ref_name}}" = "main" ]; then
                  echo "main branch"
                else
                  echo "feature branch "
                fi
                  echo "commit message: ${{ github.event.head_commit.message }}"   